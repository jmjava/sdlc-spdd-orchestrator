# docgen.yaml — updated by docgen yaml-generate
# Source: /home/ubuntu/github/jmjava/sdlc-spdd-orchestrator/docs/demos/docgen.yaml
# Note: PyYAML rewrite drops comments; review diff in Git.

repo_root: ../..
dirs:
  narration: narration
  audio: audio
  animations: animations
  recordings: recordings
segments:
  default: &id001
  - '01'
  - '02'
  - '03'
  all: *id001
segment_names:
  '01': 01-sdlc-spdd-intro
  '02': 02-install-and-workflow
  '03': 03-guide-rag-dogfood
visual_map:
  '01':
    type: manim
    class: SdlcSpddIntroScene
  '02':
    type: manim
    class: InstallWorkflowScene
  '03':
    type: manim
    class: GuideRagDogfoodScene
compose:
  ffmpeg_timeout_sec: 300
tts:
  model: gpt-4o-mini-tts
  voice: coral
  instructions: You are narrating a technical demo video about sdlc-spdd-orchestrator. Speak in a calm, professional tone.
    Pronounce technical terms clearly.
concat:
  full-demo: *id001
validation:
  max_drift_sec: 2.75
  narration_lint:
    pre_tts_deny_patterns:
    - target duration
    - intended length
    - 'visual:'
    - edit for voice
wizard:
  llm_model: gpt-4o
  system_prompt: You are a technical writer creating narration scripts for demo videos about sdlc-spdd-orchestrator. Write
    in plain spoken English suitable for text-to-speech. No markdown formatting, no headings, no bullet points. Conversational
    but professional tone, like a senior engineer presenting at a conference.
  exclude_patterns:
  - '**/node_modules/**'
  - '**/.pytest_cache/**'
  - '**/__pycache__/**'
  - '**/.venv/**'
  - '**/archive/**'
narration_from_source:
  model: gpt-4o-mini
  temperature: 0.65
  max_context_bytes: 120000
  hints: []
  context:
    paths:
    - README.md
    globs: []
  segments:
    '01':
      hints:
      - 'Open with the core problem: AI coding context lives in chat and disappears. SDLC-SPDD moves requirements, REASONS
        canvases, tasks, reviews, memory, and session handoffs into version-controlled files so a new agent session can resume
        from artifacts.'
      - 'Explain the three parts: Planning (roadmap, milestones, session notes) informs and summarizes; SPDD (REASONS Canvas)
        governs what artifact owns the work; SDLC Agents supplies role-separated lifecycle and session handoffs.'
      - Introduce the REASONS Canvas briefly — Requirements, Entities, Approach, Structure, Operations, Norms, Safeguards
        — as the fixed prompt contract before code.
      - Close by pointing to segment 02 for installing into a target project and the daily workflow sequence.
      context:
        paths:
        - README.md
        - docs/ten-thousand-foot-view.md
        - docs/what-spdd-brings.md
        - docs/three-part-operating-path.md
    '02':
      hints:
      - 'Walk the adoption path: clone the orchestrator, run setup-agent-prompts.sh against a target app, verify with verify-project-install.sh,
        then open the target in Cursor, Copilot, or Claude Code.'
      - 'Cover the first-session loop from first-day-with-sdlc-spdd.md: init, analysis, plan, architect, code one operation,
        API test, review, capture memory — one small increment.'
      - 'Reference workflow.md steps 1–6: set up prompts, initialize, map milestone work, start session with Resume Prompt,
        run analysis with index-spdd-analysis.sh, then plan.'
      - Mention Work ID prefixes (FEAT, BUG, REF, SPIKE, DOC, TEST, CHORE) and that canvases must reach Ready For Coding before
        /sdlc-spdd-code.
      - Close by noting deeper guides live in docs/README.md and docs/sdlc-spdd/ in target projects after install.
      context:
        paths:
        - docs/first-day-with-sdlc-spdd.md
        - docs/installing-into-your-project.md
        - docs/workflow.md
        - docs/initialization-and-invocation.md
    '03':
      hints:
      - Explain why this repo uses Embabel Guide + Neo4j as a local research backend during /sdlc-spdd-analysis instead of
        pasting large external docs into every prompt.
      - 'Summarize the layered menke profiles: menke (code repos), menke-2 (SPDD and context engineering URLs), menke-3 (framework
        depth), menke-4 (docgen + course-builder docs) — each an append pass on the same store.'
      - 'Describe MCP usage: docs_vectorSearch for concepts, docs_textSearch for exact CLI flags; cite chunk URIs in spdd/analysis
        artifacts.'
      - 'Present the dogfood table: SPDD on self, docgen on self (this bundle), Guide on self, posture guard keeping templates
        clean.'
      - 'State clearly what does not ship to target projects: Guide YAML, Neo4j, MCP wiring, .venv, regenerable docgen outputs.'
      context:
        paths:
        - docs/guide-rag-research-and-dogfooding.md
        - spdd/analysis/SPIKE-retrieval-reference-corpus.md
        - spdd/canvas/SPIKE-001-guide-rag-context-backend.md
        - docs/context-loading-and-scaling.md
manim_scene_generation:
  model: gpt-4o
  temperature: 0.4
  max_context_bytes: 80000
  hints:
  - Match palette and _TimedScene timing patterns from existing scenes in animations/scenes.py.
  context:
    paths: []
    globs: []
  segments:
    '01':
      class_name: SdlcSpddIntroScene
      hints:
      - 'Open with centred title "SDLC-SPDD Orchestrator", then shrink to top edge. Reveal three horizontal boxes: Planning,
        SPDD, SDLC Agents — one FadeIn each.'
      - 'Below, show a REASONS Canvas label and a row of single-letter pills R-E-A-S-O-N-S. Use orchestrator palette (accent
        #667eea, green #42b883, teal #26c6da).'
      - One reveal per mobject; stay inside safe content width. Pace to timing.json when present.
    '02':
      class_name: InstallWorkflowScene
      hints:
      - 'Title card "Install & Daily Workflow" at top. Vertical stack of five labelled boxes: Clone orchestrator, setup-agent-prompts,
        verify install, Resume Prompt session, analysis → plan → code.'
      - Reveal one box at a time with FadeIn. Blue/green/teal/orange palette consistent with segment 01.
      - Pace to timing.json when present; fallback ~14s hold if no timestamps yet.
    '03':
      class_name: GuideRagDogfoodScene
      hints:
      - 'Title "Guide RAG & Dogfooding" at top. Horizontal row of four profile pills: menke, menke-2, menke-3, menke-4 (green
        for code, blue for reference layers).'
      - 'Below: box for MCP vector + text search, then box for SPDD + docgen + Guide dogfood on self.'
      - One FadeIn per mobject; teal accent for title. Pace to timing.json when present.
manim:
  scenes:
  - SdlcSpddIntroScene
  - InstallWorkflowScene
  - GuideRagDogfoodScene
