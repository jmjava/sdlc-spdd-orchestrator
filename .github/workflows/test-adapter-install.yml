name: Test Adapter Install

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'templates/cursor/**'
      - 'templates/copilot/**'
      - 'templates/claude/**'
      - 'templates/project-github-workflows/validate-sdlc-spdd-adapters.yml'
      - 'tests/test-adapter-install.sh'
      - '.github/workflows/test-adapter-install.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/cursor/**'
      - 'templates/copilot/**'
      - 'templates/claude/**'
      - 'templates/project-github-workflows/validate-sdlc-spdd-adapters.yml'
      - 'tests/test-adapter-install.sh'
      - '.github/workflows/test-adapter-install.yml'

jobs:
  test-adapter-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n scripts/*.sh tests/test-adapter-install.sh

      - name: Run adapter install/upgrade/validation regression tests
        run: ./tests/test-adapter-install.sh
